<!DOCTYPE html>
<html lang="sl-SI">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#07070d">
    <meta name="description" content="Our Planner – a shared collaborative planner for Viki and Manja.">
    <title>Our Planner</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-0: #07070d;
            --bg-1: #0e0e1a;
            --bg-2: #141422;
            --bg-card: rgba(255,255,255,0.05);
            --bg-card-hover: rgba(255,255,255,0.09);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.09);
            --p: #7c6ef0;
            --p2: #a78bfa;
            --p-glow: rgba(124,110,240,0.28);
            --acc: #ec4899;
            --acc-glow: rgba(236,72,153,0.22);
            --green: #22d3a8;
            --red: #f87171;
            --orange: #fb923c;
            --txt-1: #f0f0ff;
            --txt-2: #8888aa;
            --txt-3: #4a4a6a;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-h: 80px;
            --font: 'Inter', sans-serif;
            --ease: cubic-bezier(.22,1,.36,1);
            --ease-spring: cubic-bezier(.34,1.56,.64,1);
        }

        /* ===== RESET ===== */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font);
            background: var(--bg-0);
            color: var(--txt-1);
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== AMBIENT GLOW ===== */
        .ambient {
            position: fixed; pointer-events: none; z-index: 0;
            border-radius: 50%; filter: blur(100px); opacity: 0.35;
            transition: all 1.5s var(--ease);
        }
        .amb-1 { width: 500px; height: 500px; background: var(--p); top: -200px; right: -150px; }
        .amb-2 { width: 400px; height: 400px; background: var(--acc); bottom: 50px; left: -150px; }

        /* ===== LAYOUT ===== */
        .app-shell { display: flex; flex-direction: column; min-height: 100dvh; }

        /* ===== HEADER ===== */
        .top-bar {
            position: sticky; top: 0; z-index: 200;
            background: rgba(7,7,13,0.88);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 1.25rem;
            padding-top: env(safe-area-inset-top, 0px);
            height: calc(64px + env(safe-area-inset-top, 0px));
            display: flex; align-items: flex-end; padding-bottom: 0.75rem;
        }
        .top-bar-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .app-logo {
            font-size: 1.5rem; font-weight: 900; letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--p2) 0%, var(--acc) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-actions { display: flex; gap: 0.625rem; }

        /* ===== ICON BUTTON ===== */
        .ibtn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--txt-1); display: grid; place-items: center;
            cursor: pointer; transition: all 0.25s var(--ease);
            -webkit-tap-highlight-color: transparent;
        }
        .ibtn:active { transform: scale(0.88); background: var(--bg-card-hover); }
        .ibtn.active { background: var(--p); border-color: var(--p); color: white; }

        /* ===== MAIN SCROLL ===== */
        main {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 0 1rem 1rem;
            padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 1rem);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== VIEWS ===== */
        .view { display: none; animation: fadeSlideIn 0.35s var(--ease) forwards; }
        .view.active { display: block; }
        @keyframes fadeSlideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

        /* ===== USER SWITCHER (pill tabs) ===== */
        .user-strip {
            display: flex; gap: 0.5rem; overflow-x: auto;
            padding: 1rem 0 0.75rem;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .user-strip::-webkit-scrollbar { display: none; }
        .user-pill {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.55rem 1.1rem; border-radius: 30px; font-size: 0.9rem;
            font-weight: 700; white-space: nowrap; cursor: pointer;
            border: 1.5px solid var(--glass-border); background: var(--glass);
            color: var(--txt-2); transition: all 0.25s var(--ease);
            flex-shrink: 0;
        }
        .user-pill.active { background: var(--p); border-color: var(--p); color: white; box-shadow: 0 4px 20px var(--p-glow); }
        .user-pill .avi {
            width: 22px; height: 22px; border-radius: 50%;
            font-size: 0.7rem; font-weight: 800; display: grid; place-items: center;
            background: rgba(255,255,255,0.15);
        }

        /* ===== WEEK STRIP ===== */
        .week-strip-wrapper { position: relative; margin-bottom: 1rem; }
        .week-strip {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 0.35rem; padding: 0.75rem; border-radius: 24px;
            background: var(--bg-card); border: 1px solid var(--glass-border);
        }
        .wday {
            display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
            padding: 0.5rem 0; border-radius: 14px; cursor: pointer;
            transition: all 0.2s var(--ease); position: relative;
        }
        .wday:active { transform: scale(0.9); }
        .wday-name { font-size: 0.65rem; font-weight: 700; color: var(--txt-2); text-transform: uppercase; letter-spacing: 0.05em; }
        .wday-num { font-size: 1rem; font-weight: 700; line-height: 1; }
        .wday.today .wday-num { color: var(--p2); }
        .wday.selected { background: var(--p); box-shadow: 0 4px 16px var(--p-glow); }
        .wday.selected .wday-name, .wday.selected .wday-num { color: white; }
        .wday-dots { display: flex; gap: 2px; height: 5px; justify-content: center; align-items: center; }
        .wdot { width: 4px; height: 4px; border-radius: 50%; }

        /* ===== CALENDAR ===== */
        .cal-card {
            background: var(--bg-card); border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 1.25rem; margin-bottom: 1rem;
        }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .cal-month-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em; }
        .cal-nav-btns { display: flex; gap: 0.5rem; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-dname { font-size: 0.65rem; font-weight: 800; color: var(--txt-3); text-align: center; padding-bottom: 4px; text-transform: uppercase; }
        .cal-day {
            aspect-ratio: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 14px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; gap: 3px;
            transition: all 0.2s var(--ease); position: relative; border: 1.5px solid transparent;
        }
        .cal-day:active { transform: scale(0.85); }
        .cal-day.other { opacity: 0.2; pointer-events: none; }
        .cal-day.today { font-weight: 800; background: rgba(124,110,240,0.15); border-color: var(--p); color: var(--p2); }
        .cal-day.selected { background: var(--p); border-color: transparent; color: white; box-shadow: 0 6px 20px var(--p-glow); }
        .cal-day.has-task::after {
            content: ''; position: absolute; bottom: 3px;
            width: 4px; height: 4px; border-radius: 50%; background: var(--acc);
        }
        .cal-day.overdue-day { color: var(--red); }

        /* ===== TASKS HEADER ===== */
        .tasks-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 1rem 0 0.75rem;
        }
        .tasks-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; }
        .tasks-meta { font-size: 0.8rem; color: var(--txt-2); font-weight: 500; margin-top: 0.2rem; }
        .progress-bar-wrap { height: 3px; background: var(--bg-2); border-radius: 99px; margin-bottom: 1rem; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--p), var(--acc)); border-radius: 99px; transition: width 0.5s var(--ease); }

        /* ===== FILTER ROW ===== */
        .filter-strip {
            display: flex; gap: 0.4rem; overflow-x: auto;
            padding-bottom: 0.75rem; scrollbar-width: none;
        }
        .filter-strip::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 0.4rem 0.9rem; border-radius: 20px; font-size: 0.78rem;
            font-weight: 700; white-space: nowrap; cursor: pointer;
            border: 1.5px solid var(--glass-border); background: var(--glass);
            color: var(--txt-2); transition: all 0.2s var(--ease); flex-shrink: 0;
        }
        .filter-chip.active { color: white; border-color: transparent; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }

        /* ===== TASK CARD ===== */
        .task-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .task-card {
            background: var(--bg-card); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 1.1rem 1.1rem 1.1rem 0;
            display: flex; align-items: stretch; gap: 0;
            cursor: pointer; transition: all 0.25s var(--ease);
            animation: taskIn 0.35s var(--ease) both; overflow: hidden; position: relative;
        }
        .task-card:active { transform: scale(0.983); }
        .task-card.completed-card { opacity: 0.5; }
        .task-card .color-bar { width: 5px; border-radius: 0 0 0 0; flex-shrink: 0; margin-right: 1rem; }
        @keyframes taskIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

        .task-check-wrap { display: flex; align-items: center; padding-right: 0.75rem; }
        .chk {
            width: 28px; height: 28px; border-radius: 9px;
            border: 2px solid var(--glass-border); background: transparent;
            display: grid; place-items: center; cursor: pointer;
            transition: all 0.25s var(--ease-spring); flex-shrink: 0;
        }
        .chk.done { border-color: transparent; }
        .chk svg { opacity: 0; transform: scale(0.5); transition: all 0.2s var(--ease-spring); }
        .chk.done svg { opacity: 1; transform: scale(1); }

        .task-body { flex: 1; min-width: 0; }
        .task-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-name.struck { text-decoration: line-through; opacity: 0.45; }
        .task-meta-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .task-badge {
            font-size: 0.7rem; font-weight: 800; padding: 3px 10px;
            border-radius: 20px; color: white; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .task-time-badge {
            font-size: 0.75rem; font-weight: 600; color: var(--txt-2);
            display: flex; align-items: center; gap: 3px;
        }
        .task-note-preview { font-size: 0.75rem; color: var(--txt-2); margin-top: 0.3rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .task-overdue-badge { font-size: 0.7rem; font-weight: 800; color: var(--red); padding: 2px 8px; border-radius: 10px; background: rgba(248,113,113,0.12); }

        .task-arrow { display: flex; align-items: center; padding-left: 0.5rem; color: var(--txt-3); }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 3rem 1.5rem; }
        .empty-icon { width: 72px; height: 72px; border-radius: 22px; background: var(--bg-2); display: grid; place-items: center; margin: 0 auto 1.25rem; color: var(--txt-3); }
        .empty-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
        .empty-sub { font-size: 0.85rem; color: var(--txt-2); }

        /* ===== SEARCH VIEW ===== */
        .search-bar-wrap { position: relative; margin: 1rem 0; }
        .search-icon-inner { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--txt-2); pointer-events: none; }
        .search-input {
            width: 100%; padding: 1rem 1rem 1rem 3rem;
            border-radius: 18px; background: var(--bg-card);
            border: 1.5px solid var(--glass-border); color: var(--txt-1);
            font-family: var(--font); font-size: 1rem;
            transition: all 0.25s var(--ease); outline: none;
        }
        .search-input:focus { border-color: var(--p); background: var(--bg-card-hover); }
        .search-input::placeholder { color: var(--txt-3); }


        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(7,7,13,0.92);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border-top: 1px solid var(--glass-border);
            z-index: 200;
            padding-bottom: var(--safe-bottom);
        }
        .nav-inner { display: flex; align-items: center; height: var(--nav-h); padding: 0 0.5rem; }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; cursor: pointer;
            color: var(--txt-3); transition: all 0.25s var(--ease);
            height: 100%; border-radius: 16px; padding: 0 0.25rem;
        }
        .nav-item.active { color: var(--p2); }
        .nav-item:active { transform: scale(0.88); }
        .nav-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }

        .nav-add-btn {
            width: 58px; height: 58px; border-radius: 20px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--p), var(--acc));
            display: grid; place-items: center; cursor: pointer;
            box-shadow: 0 8px 28px var(--p-glow); margin: 0 0.25rem;
            transition: all 0.3s var(--ease-spring); border: none; color: white;
        }
        .nav-add-btn:active { transform: scale(0.88) rotate(-5deg); }

        /* ===== MODALS (Bottom Sheet) ===== */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            align-items: flex-end; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-overlay.center { align-items: center; padding: 1rem; }

        .modal-sheet {
            background: var(--bg-1); width: 100%; max-width: 520px;
            border-radius: 32px 32px 0 0; border: 1px solid var(--glass-border);
            border-bottom: none; overflow: hidden;
            animation: sheetUp 0.4s var(--ease) forwards;
            max-height: 95dvh; display: flex; flex-direction: column;
        }
        @media(min-width:520px) {
            .modal-sheet { border-radius: 32px; border-bottom: 1px solid var(--glass-border); }
        }
        @keyframes sheetUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }

        .modal-handle { width: 40px; height: 4px; background: var(--txt-3); border-radius: 99px; margin: 0.75rem auto 0; flex-shrink: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; flex-shrink: 0; }
        .modal-title { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em; }
        .modal-body { padding: 0 1.5rem 1.5rem; overflow-y: auto; flex: 1; }
        .modal-pad-bottom { padding-bottom: calc(var(--safe-bottom) + 0.5rem); }

        /* ===== FORM ELEMENTS ===== */
        .form-field { margin-bottom: 1.25rem; }
        .form-label { font-size: 0.72rem; font-weight: 800; color: var(--txt-2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; display: block; }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 0.9rem 1rem; border-radius: 16px;
            background: var(--bg-2); border: 1.5px solid var(--glass-border);
            color: var(--txt-1); font-family: var(--font); font-size: 0.95rem;
            outline: none; transition: border-color 0.2s var(--ease);
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--p); }
        .form-input::placeholder, .form-textarea::placeholder { color: var(--txt-3); }
        .form-textarea { min-height: 88px; resize: none; line-height: 1.5; }
        .form-select { appearance: none; cursor: pointer; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        /* ===== BUTTONS ===== */
        .btn { padding: 0.9rem 1.5rem; border-radius: 16px; font-family: var(--font); font-size: 0.95rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.25s var(--ease); display: flex; align-items: center; gap: 0.5rem; justify-content: center; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, var(--p), var(--acc)); color: white; box-shadow: 0 8px 24px var(--p-glow); }
        .btn-secondary { background: var(--bg-2); color: var(--txt-2); border: 1px solid var(--glass-border); }
        .btn-danger { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
        .btn-full { width: 100%; }
        .btn-group { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
        .btn-group .btn-primary { flex: 1; }

        /* ===== CATEGORY TAGS ===== */
        .cat-item {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.9rem 1rem; background: var(--bg-2);
            border-radius: 16px; margin-bottom: 0.5rem; border: 1px solid var(--glass-border);
        }
        .cat-swatch { width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0; }
        .cat-name { flex: 1; font-weight: 700; }
        .cat-del { background: none; border: none; color: var(--txt-3); cursor: pointer; padding: 0.25rem; display: grid; place-items: center; transition: color 0.2s; }
        .cat-del:hover { color: var(--red); }

        .color-picker-wrap { display: flex; gap: 0.75rem; align-items: center; }
        .color-input-native { width: 52px; height: 52px; border-radius: 14px; border: 1.5px solid var(--glass-border); background: transparent; cursor: pointer; padding: 4px; }
        .color-presets { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .color-preset { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; transition: transform 0.15s var(--ease-spring); border: 2px solid transparent; }
        .color-preset:active { transform: scale(0.85); }
        .color-preset.sel { border-color: white; transform: scale(1.1); }

        /* ===== TOAST ===== */
        .toast-stack { position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 1rem); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; pointer-events: none; }
        .toast {
            background: var(--bg-1); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 0.75rem 1.25rem; font-size: 0.85rem; font-weight: 600;
            white-space: nowrap; max-width: 280px; text-align: center;
            animation: toastIn 0.35s var(--ease-spring) forwards;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        @keyframes toastIn { from { opacity:0; transform:scale(0.8) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
        @keyframes toastOut { to { opacity:0; transform:scale(0.8) translateY(10px); } }

        /* ===== ALL USERS VIEW ===== */
        .user-section-title { font-size: 1rem; font-weight: 800; color: var(--txt-2); margin: 1.25rem 0 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: 0.7rem; font-weight: 800; }

        /* ===== REMINDER BADGE ===== */
        .upcoming-banner {
            background: rgba(251,146,60,0.12); border: 1px solid rgba(251,146,60,0.25);
            border-radius: 18px; padding: 0.9rem 1.1rem;
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 1rem; cursor: pointer;
        }
        .upcoming-banner .ub-icon { color: var(--orange); flex-shrink: 0; }
        .upcoming-banner .ub-text { font-size: 0.85rem; font-weight: 600; }
        .upcoming-banner .ub-count { font-size: 0.75rem; color: var(--orange); font-weight: 700; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
</head>
<body>
    <div class="ambient amb-1"></div>
    <div class="ambient amb-2"></div>
    <div class="toast-stack" id="toastStack"></div>

    <div class="app-shell">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-inner">
                <div class="app-logo">Our Planner</div>
                <div class="top-actions">
                    <button class="ibtn" id="lightModeBtn" onclick="toggleTheme()" title="Toggle theme">
                        <i data-lucide="sun" size="20"></i>
                    </button>
                    <button class="ibtn" onclick="openSettings()" title="Settings">
                        <i data-lucide="settings-2" size="20"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <main id="mainScroll">
            <!-- HOME VIEW -->
            <div class="view active" id="view-home">
                <!-- User switcher -->
                <div class="user-strip" id="userStrip"></div>

                <!-- Upcoming reminders banner -->
                <div class="upcoming-banner" id="upcomingBanner" style="display:none" onclick="nav('search')">
                    <i data-lucide="bell-ring" size="22" class="ub-icon"></i>
                    <div>
                        <div class="ub-count" id="upcomingCount"></div>
                        <div class="ub-text">Tap to view upcoming tasks</div>
                    </div>
                </div>

                <!-- Week strip -->
                <div class="week-strip-wrapper">
                    <div class="week-strip" id="weekStrip"></div>
                </div>

                <!-- Full Calendar -->
                <div class="cal-card">
                    <div class="cal-nav">
                        <div class="cal-month-title" id="calMonthTitle"></div>
                        <div class="cal-nav-btns">
                            <button class="ibtn" onclick="prevMonth()" style="width:36px;height:36px;border-radius:10px"><i data-lucide="chevron-left" size="18"></i></button>
                            <button class="ibtn" onclick="nextMonth()" style="width:36px;height:36px;border-radius:10px"><i data-lucide="chevron-right" size="18"></i></button>
                        </div>
                    </div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>

                <!-- Task list header -->
                <div class="tasks-header">
                    <div>
                        <div class="tasks-title" id="dayTitle">Today</div>
                        <div class="tasks-meta" id="taskMeta">Loading...</div>
                    </div>
                    <button class="ibtn" onclick="openTaskModal(null, false)" title="Add task" style="background:linear-gradient(135deg,var(--p),var(--acc));border-color:transparent;color:white">
                        <i data-lucide="plus" size="22"></i>
                    </button>
                </div>

                <!-- Progress bar -->
                <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>

                <!-- Filter chips -->
                <div class="filter-strip" id="filterStrip"></div>

                <!-- Task list -->
                <div class="task-list" id="taskList"></div>
            </div>

            <!-- SEARCH VIEW -->
            <div class="view" id="view-search">
                <div class="search-bar-wrap">
                    <i data-lucide="search" class="search-icon-inner" size="20"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search all tasks…" oninput="renderSearch()">
                </div>
                <div class="task-list" id="searchResults"></div>
            </div>

            <!-- ALL view -->
            <div class="view" id="view-all">
                <div style="padding-top:1rem">
                    <div class="tasks-title" style="margin-bottom:0.25rem">Everyone's Plans</div>
                    <div class="tasks-meta" id="allMeta" style="margin-bottom:1rem"></div>
                    <div id="allTaskList"></div>
                </div>
            </div>

        </main>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <div class="nav-inner">
                <div class="nav-item active" id="nav-home" onclick="nav('home')">
                    <i data-lucide="calendar-days" size="24"></i>
                    <span class="nav-label">Home</span>
                </div>
                <div class="nav-item" id="nav-all" onclick="nav('all')">
                    <i data-lucide="users" size="24"></i>
                    <span class="nav-label">All</span>
                </div>
                <button class="nav-add-btn" onclick="openTaskModal(null, false)">
                    <i data-lucide="plus" size="28"></i>
                </button>
                <div class="nav-item" id="nav-search" onclick="nav('search')">
                    <i data-lucide="search" size="24"></i>
                    <span class="nav-label">Search</span>
                </div>
            </div>
        </nav>
    </div>

    <!-- ===== TASK MODAL ===== -->
    <div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="modal-title" id="taskModalTitle">New Task</div>
                <button class="ibtn" onclick="closeTaskModal()"><i data-lucide="x" size="20"></i></button>
            </div>
            <div class="modal-body modal-pad-bottom">
                <input type="hidden" id="editId">
                <div class="form-field">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" id="fTitle" placeholder="What's the plan?" autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-input" id="fDate">
                    </div>
                    <div class="form-field">
                        <label class="form-label">Time (opt.)</label>
                        <input type="time" class="form-input" id="fTime">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label class="form-label">Tag</label>
                        <select class="form-select" id="fCategory"></select>
                    </div>
                    <div class="form-field">
                        <label class="form-label">Remind (days)</label>
                        <input type="number" class="form-input" id="fRemind" value="2" min="0" max="30">
                    </div>
                </div>
                <div class="form-field">
                    <label class="form-label">Notes (optional)</label>
                    <textarea class="form-textarea" id="fNote" placeholder="Any extra details…"></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-danger" id="delBtn" style="display:none" onclick="deleteTask()">
                        <i data-lucide="trash-2" size="18"></i> Delete
                    </button>
                    <button class="btn btn-primary" onclick="saveTask()">
                        <i data-lucide="check" size="18"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SETTINGS MODAL ===== -->
    <div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="modal-title">Settings</div>
                <button class="ibtn" onclick="closeSettings()"><i data-lucide="x" size="20"></i></button>
            </div>
            <div class="modal-body modal-pad-bottom">
                <div style="font-size:0.72rem;font-weight:800;color:var(--txt-2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.75rem">Manage Tags</div>
                <div id="catList" style="margin-bottom:1rem"></div>
                <div style="background:var(--bg-2);border-radius:20px;padding:1.25rem;border:1px solid var(--glass-border);">
                    <div style="font-size:0.72rem;font-weight:800;color:var(--txt-2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.75rem">New Tag</div>
                    <div class="form-field" style="margin-bottom:0.75rem">
                        <input type="text" class="form-input" id="newCatName" placeholder="Tag name…">
                    </div>
                    <div class="form-field" style="margin-bottom:0.75rem">
                        <div class="color-picker-wrap">
                            <input type="color" class="color-input-native" id="newCatColor" value="#7c6ef0">
                            <div class="color-presets" id="colorPresets"></div>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="addCategory()">
                        <i data-lucide="tag" size="18"></i> Create Tag
                    </button>
                </div>
                <div style="margin-top:1.5rem;font-size:0.72rem;font-weight:800;color:var(--txt-2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.75rem">Manage Users</div>
                <div id="userManage"></div>
            </div>
        </div>
    </div>

    <script>
    // ===== STATE =====
    let tasks = [], categories = [], users = ['Viki','Manja'];
    let currentUser = localStorage.getItem('cu') || 'Viki';
    let selectedDate = new Date();
    let calViewDate = new Date();
    let activeView = 'home';
    let activeFilter = 'all';
    let darkMode = localStorage.getItem('theme') !== 'light';
    let lastTap = 0, lastDateStr = '';

    function toIsoDate(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
    function toDisplayDate(d) { return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear(); }

    const TODAY = toIsoDate(new Date());
    const COLOR_PRESETS = ['#7c6ef0','#ec4899','#22d3a8','#f59e0b','#f87171','#38bdf8','#a78bfa','#fb923c'];

    // ===== KEYBOARD EVENTS =====
    document.addEventListener('keydown', (e) => {
        if (e.key === '+' || e.key === '=') {
            e.preventDefault();
            openTaskModal(null, true); // Open with date auto-locked
        }
    });

    // ===== INIT =====
    async function init() {
        applyTheme();
        buildColorPresets();
        await loadData();
        buildUserStrip();
        buildUserManage();
        renderWeekStrip();
        renderCalendar();
        renderHome();
        checkUpcoming();
        lucide.createIcons();
    }

    // ===== DATA =====
    async function loadData() {
        try {
            const r = await fetch('/api/data');
            const d = await r.json();
            tasks = d.tasks || [];
            categories = d.categories || [];
            buildCategorySelects();
        } catch(e) {
            console.warn('Offline mode');
            const cached = localStorage.getItem('plannerData');
            if(cached) { const d = JSON.parse(cached); tasks = d.tasks||[]; categories = d.categories||[]; }
            buildCategorySelects();
        }
    }

    async function saveData(showToast = true) {
        const body = { tasks, categories };
        localStorage.setItem('plannerData', JSON.stringify(body));
        try {
            await fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
            if(showToast) toast('Saved ✓', 1500);
        } catch(e) {
            toast('Saved offline', 1500);
        }
    }

    // ===== THEME =====
    function applyTheme() {
        document.body.style.setProperty('--bg-0', darkMode ? '#07070d' : '#f0f0f8');
        document.body.style.setProperty('--bg-1', darkMode ? '#0e0e1a' : '#ffffff');
        document.body.style.setProperty('--bg-2', darkMode ? '#141422' : '#f4f4fb');
        document.body.style.setProperty('--bg-card', darkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)');
        document.body.style.setProperty('--bg-card-hover', darkMode ? 'rgba(255,255,255,0.09)' : 'rgba(0,0,0,0.07)');
        document.body.style.setProperty('--glass', darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)');
        document.body.style.setProperty('--glass-border', darkMode ? 'rgba(255,255,255,0.09)' : 'rgba(0,0,0,0.1)');
        document.body.style.setProperty('--txt-1', darkMode ? '#f0f0ff' : '#0d0d1a');
        document.body.style.setProperty('--txt-2', darkMode ? '#8888aa' : '#6060a0');
        document.body.style.setProperty('--txt-3', darkMode ? '#4a4a6a' : '#b8b8d0');
        document.querySelector('.ambient.amb-1').style.opacity = darkMode ? '0.35' : '0.12';
        document.querySelector('.ambient.amb-2').style.opacity = darkMode ? '0.35' : '0.1';
    }
    function toggleTheme() { darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light'); applyTheme(); toast(darkMode ? '🌙 Dark mode' : '☀️ Light mode', 1500); }

    // ===== NAVIGATION =====
    function nav(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-'+view).classList.add('active');
        const ni = document.getElementById('nav-'+view);
        if(ni) ni.classList.add('active');
        activeView = view;
        document.getElementById('mainScroll').scrollTop = 0;
        if(view === 'search') setTimeout(() => document.getElementById('searchInput').focus(), 100);
        if(view === 'all') renderAll();
        lucide.createIcons();
    }

    // ===== USER STRIP =====
    function buildUserStrip() {
        const el = document.getElementById('userStrip');
        const labels = { 'Viki': '💜', 'Manja': '🌸', 'Admin': '⚙️' };
        el.innerHTML = users.map(u => `
            <div class="user-pill ${u===currentUser?'active':''}" onclick="switchUser('${u}')">
                <span class="avi">${labels[u]||u[0]}</span> ${u}
            </div>
        `).join('');
    }
    function switchUser(u) {
        currentUser = u;
        localStorage.setItem('cu', u);
        buildUserStrip();
        renderCalendar();
        renderHome();
        haptic();
    }

    function buildUserManage() {
        const el = document.getElementById('userManage');
        const labels = { 'Viki': '💜', 'Manja': '🌸', 'Admin': '⚙️' };
        el.innerHTML = users.map(u => `
            <div class="cat-item">
                <span style="font-size:1.2rem">${labels[u]||'👤'}</span>
                <span class="cat-name">${u}</span>
                <span style="font-size:0.75rem;color:var(--txt-2);font-weight:600">${tasks.filter(t=>t.user===u).length} tasks</span>
            </div>
        `).join('');
    }

    // ===== WEEK STRIP =====
    function renderWeekStrip() {
        const el = document.getElementById('weekStrip');
        const dayNames = ['Ne','Po','To','Sr','Če','Pe','So'];
        const start = new Date(selectedDate);
        let dayIdx = start.getDay();
        dayIdx = (dayIdx === 0) ? 6 : dayIdx - 1;
        start.setDate(start.getDate() - dayIdx);
        el.innerHTML = '';
        for(let i=0; i<7; i++) {
            const d = new Date(start); d.setDate(start.getDate()+i);
            const ds = toIsoDate(d);
            const dayTasks = tasks.filter(t => t.date===ds && t.user===currentUser);
            const isToday = ds === TODAY;
            const isSel = ds === toIsoDate(selectedDate);
            const div = document.createElement('div');
            div.className = 'wday' + (isToday?' today':'') + (isSel?' selected':'');
            const dotsHtml = dayTasks.slice(0,3).map(t => {
                const cat = categories.find(c=>c.name===t.category);
                return `<div class="wdot" style="background:${cat?cat.color:'var(--txt-2)'}"></div>`;
            }).join('');
            div.innerHTML = `<span class="wday-name">${dayNames[d.getDay()]}</span><span class="wday-num">${d.getDate()}</span><div class="wday-dots">${dotsHtml}</div>`;
            div.onclick = () => {
                const now = Date.now();
                if (now - lastTap < 300 && lastDateStr === ds) {
                    selectedDate = d;
                    openTaskModal(null, true);
                } else {
                    selectedDate = d;
                    renderWeekStrip(); renderCalendar(); renderHome(); haptic();
                }
                lastTap = now; lastDateStr = ds;
            };
            el.appendChild(div);
        }
    }

    // ===== CALENDAR =====
    function renderCalendar() {
        const grid = document.getElementById('calGrid');
        const y = calViewDate.getFullYear(), m = calViewDate.getMonth();
        const monthStr = new Intl.DateTimeFormat('sl-SI',{month:'long',year:'numeric'}).format(calViewDate);
        document.getElementById('calMonthTitle').textContent = monthStr.charAt(0).toUpperCase() + monthStr.slice(1);
        const dayNames = ['P','T','S','Č','P','S','N'];
        grid.innerHTML = dayNames.map(d=>`<div class="cal-dname">${d}</div>`).join('');
        let first = new Date(y,m,1).getDay();
        first = (first === 0) ? 6 : first - 1;
        const days = new Date(y,m+1,0).getDate();
        const prevDays = new Date(y,m,0).getDate();
        for(let i=0;i<first;i++){
            const div = document.createElement('div');
            div.className = 'cal-day other';
            div.textContent = prevDays-first+i+1;
            grid.appendChild(div);
        }
        for(let i=1;i<=days;i++){
            const d = new Date(y,m,i);
            const ds = toIsoDate(d);
            const hasTasks = tasks.some(t=>t.date===ds && t.user===currentUser);
            const isToday = ds===TODAY;
            const isSel = ds===toIsoDate(selectedDate);
            const isOverdue = ds<TODAY && hasTasks && tasks.some(t=>t.date===ds&&t.user===currentUser&&!t.completed);
            const div = document.createElement('div');
            div.className = 'cal-day'+(isToday?' today':'')+(isSel?' selected':'')+(hasTasks?' has-task':'')+(isOverdue?' overdue-day':'');
            div.textContent = i;
            div.onclick = () => {
                const now = Date.now();
                if (now - lastTap < 300 && lastDateStr === ds) {
                    selectedDate = d;
                    openTaskModal(null, true);
                } else {
                    selectedDate = d;
                    renderWeekStrip(); renderCalendar(); renderHome(); haptic();
                }
                lastTap = now; lastDateStr = ds;
            };
            grid.appendChild(div);
        }
        const rem = 42 - first - days;
        for(let i=1;i<=rem;i++){
            const div = document.createElement('div');
            div.className = 'cal-day other';
            div.textContent = i;
            grid.appendChild(div);
        }
        lucide.createIcons();
    }

    function prevMonth() { calViewDate.setMonth(calViewDate.getMonth()-1); renderCalendar(); }
    function nextMonth() { calViewDate.setMonth(calViewDate.getMonth()+1); renderCalendar(); }

    // ===== RENDER HOME =====
    function renderHome() {
        const ds = toIsoDate(selectedDate);
        const isToday = ds === TODAY;
        document.getElementById('dayTitle').textContent = isToday ? 'Danes' : toDisplayDate(selectedDate);

        let filtered = tasks.filter(t => t.user===currentUser && t.date===ds);
        if(activeFilter !== 'all') filtered = filtered.filter(t => t.category === activeFilter);

        const done = filtered.filter(t=>t.completed).length;
        const pct = filtered.length ? Math.round(done/filtered.length*100) : 0;
        document.getElementById('taskMeta').textContent = `${filtered.length} nalog${filtered.length!==1?'':'o'} · ${done} opravljenih`;
        document.getElementById('progressBar').style.width = pct+'%';

        renderFilterStrip(ds);
        renderTaskList(filtered, 'taskList');
        buildUserManage();
        checkUpcoming();
    }

    // ===== FILTER STRIP =====
    function renderFilterStrip(ds) {
        const el = document.getElementById('filterStrip');
        const dayCats = [...new Set(tasks.filter(t=>t.user===currentUser&&t.date===ds).map(t=>t.category))];
        el.innerHTML = `<div class="filter-chip ${activeFilter==='all'?'active':''}" style="${activeFilter==='all'?'background:var(--p)':'background:var(--bg-card)'}" onclick="setFilter('all')">All</div>` +
            dayCats.map(c => {
                const cat = categories.find(x=>x.name===c);
                const color = cat ? cat.color : '#888';
                return `<div class="filter-chip ${activeFilter===c?'active':''}" style="${activeFilter===c?'background:'+color+';border-color:'+color:''}" onclick="setFilter('${c}')">${c}</div>`;
            }).join('');
    }
    function setFilter(f) { activeFilter = f; renderHome(); }

    // ===== TASK LIST RENDERER =====
    function renderTaskList(list, containerId) {
        const el = document.getElementById(containerId);
        if(!el) return;
        if(!list.length) {
            el.innerHTML = `<div class="empty-state">
                <div class="empty-icon"><i data-lucide="calendar-check" size="32"></i></div>
                <div class="empty-title">All clear!</div>
                <div class="empty-sub">No tasks here. Add one to get started.</div>
            </div>`;
            lucide.createIcons(); return;
        }
        el.innerHTML = '';
        list.forEach((t, idx) => {
            const cat = categories.find(c=>c.name===t.category) || {color:'#888',name:'?'};
            const overdue = t.date < TODAY && !t.completed;
            const card = document.createElement('div');
            card.className = 'task-card' + (t.completed?' completed-card':'');
            card.style.animationDelay = (idx*0.05)+'s';
            const timeHtml = t.time ? `<span class="task-time-badge"><i data-lucide="clock" size="12"></i>${t.time}</span>` : '';
            const overdueHtml = overdue ? `<span class="task-overdue-badge">Overdue</span>` : '';
            const noteHtml = t.note ? `<div class="task-note-preview">${escHtml(t.note)}</div>` : '';
            card.innerHTML = `
                <div class="color-bar" style="background:${cat.color}"></div>
                <div class="task-check-wrap">
                    <div class="chk ${t.completed?'done':''}" onclick="event.stopPropagation();toggleTask('${t.id}')" style="${t.completed?'background:'+cat.color:'border-color:'+cat.color+'55'}">
                        <i data-lucide="check" size="14" color="${t.completed?'white':cat.color}"></i>
                    </div>
                </div>
                <div class="task-body" onclick="openTaskModal('${t.id}')">
                    <div class="task-name${t.completed?' struck':''}">${escHtml(t.title)}</div>
                    <div class="task-meta-row">
                        <span class="task-badge" style="background:${cat.color}88">${cat.name}</span>
                        ${timeHtml}
                        ${overdueHtml}
                    </div>
                    ${noteHtml}
                </div>
                <div class="task-arrow" onclick="openTaskModal('${t.id}')"><i data-lucide="chevron-right" size="18"></i></div>
            `;
            el.appendChild(card);
        });
        lucide.createIcons();
    }

    // ===== ALL USERS VIEW =====
    function renderAll() {
        const el = document.getElementById('allTaskList');
        const ds = toIsoDate(selectedDate);
        el.innerHTML = '';
        const labels = { 'Viki':'💜','Manja':'🌸','Admin':'⚙️' };
        let totalCount = 0;
        users.forEach(u => {
            const uTasks = tasks.filter(t=>t.user===u && t.date===ds);
            totalCount += uTasks.length;
            const sec = document.createElement('div');
            sec.innerHTML = `<div class="user-section-title"><span style="font-size:1.2rem">${labels[u]||'👤'}</span>${u} <span style="font-size:0.8rem;color:var(--txt-3);font-weight:500">(${uTasks.length})</span></div>`;
            const listEl = document.createElement('div');
            listEl.className = 'task-list';
            listEl.id = 'allList-'+u;
            sec.appendChild(listEl);
            el.appendChild(sec);
            renderTaskList(uTasks, 'allList-'+u);
        });
        document.getElementById('allMeta').textContent = toDisplayDate(selectedDate) + ` · ${totalCount} nalog`;
        lucide.createIcons();
    }

    // ===== SEARCH =====
    function renderSearch() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        const el = document.getElementById('searchResults');
        if(!q) { el.innerHTML = ''; return; }
        const res = tasks.filter(t => (t.title||'').toLowerCase().includes(q) || (t.note||'').toLowerCase().includes(q) || t.user.toLowerCase().includes(q));
        renderTaskList(res, 'searchResults');
    }

    // ===== UPCOMING REMINDERS =====
    function checkUpcoming() {
        const soon = [];
        tasks.forEach(t => {
            if(!t.completed && t.remindDays) {
                const diff = (new Date(t.date) - new Date()) / 86400000;
                if(diff >= 0 && diff <= parseInt(t.remindDays)) soon.push(t);
            }
        });
        const banner = document.getElementById('upcomingBanner');
        if(soon.length) {
            banner.style.display = 'flex';
            document.getElementById('upcomingCount').textContent = `${soon.length} nalog${soon.length!==1?'':'a'} prihajajo`;
        } else {
            banner.style.display = 'none';
        }
    }


    // ===== CATEGORIES =====
    function buildCategorySelects() {
        const sel = document.getElementById('fCategory');
        if(sel) sel.innerHTML = categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
        renderCatList();
    }

    function renderCatList() {
        const el = document.getElementById('catList');
        if(!el) return;
        el.innerHTML = categories.map((c,i) => `
            <div class="cat-item">
                <div class="cat-swatch" style="background:${c.color};box-shadow:0 0 10px ${c.color}55"></div>
                <span class="cat-name">${escHtml(c.name)}</span>
                <button class="cat-del" onclick="removeCategory(${i})"><i data-lucide="x" size="16"></i></button>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function addCategory() {
        const name = document.getElementById('newCatName').value.trim();
        const color = document.getElementById('newCatColor').value;
        if(!name) { toast('Enter a tag name', 2000); return; }
        if(categories.find(c=>c.name.toLowerCase()===name.toLowerCase())) { toast('Tag already exists', 2000); return; }
        categories.push({name, color});
        document.getElementById('newCatName').value = '';
        saveData(false);
        buildCategorySelects();
        toast(`Tag "${name}" created`, 1500);
        haptic();
    }

    function removeCategory(i) {
        const c = categories[i];
        categories.splice(i,1);
        saveData(false);
        buildCategorySelects();
        toast(`Removed "${c.name}"`, 1500);
        haptic();
    }

    function buildColorPresets() {
        const el = document.getElementById('colorPresets');
        el.innerHTML = COLOR_PRESETS.map(color => `
            <div class="color-preset${document.getElementById('newCatColor')?.value===color?' sel':''}" style="background:${color}" onclick="selectPresetColor('${color}')"></div>
        `).join('');
    }

    function selectPresetColor(color) {
        document.getElementById('newCatColor').value = color;
        document.querySelectorAll('.color-preset').forEach(el => {
            el.classList.toggle('sel', el.style.background===color || el.style.background==='rgb('+hexToRgb(color)+')');
        });
        haptic();
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `${r}, ${g}, ${b}`;
    }

    // ===== TASK MODAL =====
    function openTaskModal(id = null, dateAutoLocked = false) {
        const modal = document.getElementById('taskModal');
        const dateField = document.getElementById('fDate');
        document.getElementById('editId').value = id || '';
        document.getElementById('delBtn').style.display = id ? 'flex' : 'none';
        document.getElementById('taskModalTitle').textContent = id ? 'Edit Task' : 'New Task';
        buildCategorySelects();
        if(id) {
            const t = tasks.find(x=>x.id===id);
            if(!t) return;
            document.getElementById('fTitle').value = t.title || '';
            document.getElementById('fDate').value = t.date || '';
            document.getElementById('fTime').value = t.time || '';
            document.getElementById('fCategory').value = t.category || '';
            document.getElementById('fRemind').value = t.remindDays || 2;
            document.getElementById('fNote').value = t.note || '';
            dateField.removeAttribute('readonly');
        } else {
            document.getElementById('fTitle').value = '';
            document.getElementById('fDate').value = toIsoDate(selectedDate);
            document.getElementById('fTime').value = '';
            document.getElementById('fRemind').value = 2;
            document.getElementById('fNote').value = '';
            
            // Handle date auto-lock
            if (dateAutoLocked) {
                dateField.setAttribute('readonly', true);
                dateField.style.opacity = '0.7';
                dateField.style.pointerEvents = 'none';
            } else {
                dateField.removeAttribute('readonly');
                dateField.style.opacity = '1';
                dateField.style.pointerEvents = 'auto';
            }
        }
        modal.classList.add('open');
        setTimeout(() => document.getElementById('fTitle').focus(), 300);
        lucide.createIcons();
    }

    function closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }

    function saveTask() {
        const title = document.getElementById('fTitle').value.trim();
        if(!title) { toast('Please enter a title', 2000); document.getElementById('fTitle').focus(); return; }
        const editId = document.getElementById('editId').value;
        const data = {
            title,
            date: document.getElementById('fDate').value,
            time: document.getElementById('fTime').value,
            category: document.getElementById('fCategory').value,
            remindDays: parseInt(document.getElementById('fRemind').value)||2,
            note: document.getElementById('fNote').value.trim()
        };
        if(editId) {
            const idx = tasks.findIndex(x=>x.id===editId);
            if(idx>-1) tasks[idx] = {...tasks[idx], ...data};
        } else {
            tasks.push({id: Date.now().toString(), user: currentUser, completed: false, ...data});
        }
        saveData().then(() => { closeTaskModal(); renderCalendar(); renderWeekStrip(); renderHome(); });
        haptic();
    }

    function toggleTask(id) {
        const t = tasks.find(x=>x.id===id);
        if(!t) return;
        t.completed = !t.completed;
        saveData(false);
        renderHome();
        if(t.completed) toast('Task done! ✓', 1200);
        haptic();
    }

    function deleteTask() {
        const id = document.getElementById('editId').value;
        if(!id) return;
        tasks = tasks.filter(x=>x.id!==id);
        saveData().then(() => { closeTaskModal(); renderCalendar(); renderWeekStrip(); renderHome(); });
        toast('Task deleted', 1500);
        haptic();
    }

    // ===== SETTINGS =====
    function openSettings() { document.getElementById('settingsModal').classList.add('open'); renderCatList(); buildUserManage(); lucide.createIcons(); }
    function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

    // ===== TOAST =====
    function toast(msg, dur=2000) {
        const stack = document.getElementById('toastStack');
        const div = document.createElement('div');
        div.className = 'toast';
        div.textContent = msg;
        stack.appendChild(div);
        setTimeout(() => { div.style.animation = 'toastOut 0.3s var(--ease) forwards'; setTimeout(() => div.remove(), 300); }, dur);
    }

    // ===== HAPTIC =====
    function haptic() {
        if(navigator.vibrate) navigator.vibrate(8);
    }

    // ===== UTILS =====
    function escHtml(str) {
        return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== SWIPE TO CHANGE WEEK =====
    (function() {
        let startX = 0, startY = 0;
        document.getElementById('mainScroll').addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });
        document.getElementById('mainScroll').addEventListener('touchend', e => {
            if(activeView !== 'home') return;
            const dx = e.changedTouches[0].clientX - startX;
            const dy = Math.abs(e.changedTouches[0].clientY - startY);
            if(Math.abs(dx) > 60 && dy < 50) {
                if(dx < 0) { selectedDate.setDate(selectedDate.getDate()+7); }
                else { selectedDate.setDate(selectedDate.getDate()-7); }
                renderWeekStrip(); renderCalendar(); renderHome(); haptic();
            }
        }, { passive: true });
    })();

    init();
    </script>
</body>
</html>
