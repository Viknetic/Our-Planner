<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Planner | Premium</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #050508;
            --bg-main: #0a0a0f;
            --card-glass: rgba(255, 255, 255, 0.04);
            --card-glass-hover: rgba(255, 255, 255, 0.08);
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.1);
            --font-main: 'Outfit', sans-serif;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.light-mode {
            --bg-deep: #f1f5f9; --bg-main: #ffffff; --card-glass: rgba(0, 0, 0, 0.03); 
            --text-primary: #0f172a; --text-secondary: #64748b; --border-glass: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-main); background-color: var(--bg-deep); color: var(--text-primary);
            min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden;
            transition: background-color 0.5s var(--ease);
        }

        .bg-glow { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); z-index: -1; filter: blur(80px); pointer-events: none; opacity: 0.6; }
        .glow-1 { top: -150px; right: -150px; }
        .glow-2 { bottom: -150px; left: -150px; }

        header {
            padding: 1.5rem; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-glass);
        }

        .header-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .header-actions { display: flex; align-items: center; gap: 1rem; }

        .icon-btn {
            width: 48px; height: 48px; border-radius: 16px; border: 1px solid var(--border-glass);
            background: var(--card-glass); color: var(--text-primary); display: grid; place-items: center;
            cursor: pointer; transition: all 0.4s var(--ease);
        }
        .icon-btn:active { transform: scale(0.9); background: var(--card-glass-hover); }

        /* Premium Styled Select */
        .select-wrapper { position: relative; min-width: 110px; }
        select {
            width: 100%; padding: 0.8rem 2.8rem 0.8rem 1.2rem; border-radius: 16px; background: var(--card-glass); 
            color: var(--text-primary); border: 1px solid var(--border-glass); font-family: inherit; font-weight: 600;
            font-size: 1rem; outline: none; appearance: none; cursor: pointer; transition: all 0.3s var(--ease);
        }
        select:focus { border-color: var(--accent-primary); box-shadow: 0 0 15px var(--accent-glow); }
        .select-chevron { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.5; }

        main { flex: 1; padding: 1.5rem; max-width: 600px; margin: 0 auto; width: 100%; padding-bottom: 120px; }

        .search-container { position: relative; margin-bottom: 2rem; }
        .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }
        .search-bar {
            background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 20px;
            padding: 1.2rem 1.2rem 1.2rem 3.5rem; width: 100%; color: var(--text-primary); font-family: inherit;
            font-size: 1.1rem; transition: all 0.4s var(--ease);
        }
        .search-bar:focus { outline: none; border-color: var(--accent-primary); background: var(--card-glass-hover); }

        .card { background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 32px; padding: 1.75rem; margin-bottom: 2.5rem; backdrop-filter: blur(12px); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .calendar-header h3 { font-size: 1.2rem; font-weight: 700; text-transform: capitalize; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-name { font-size: 0.75rem; font-weight: 800; color: var(--text-secondary); text-align: center; margin-bottom: 10px; opacity: 0.6; }
        
        .day {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 18px; font-size: 1.05rem; font-weight: 600; cursor: pointer; position: relative; 
            transition: all 0.3s var(--ease); border: 1px solid transparent; gap: 4px;
        }
        .day:hover { background: var(--card-glass-hover); }
        .day.today { background: var(--accent-primary); color: white; box-shadow: 0 10px 20px var(--accent-glow); }
        .day.selected { border: 2px solid var(--accent-secondary); background: rgba(236, 72, 153, 0.1); }
        .day.other-month { opacity: 0.25; }

        /* Task Indicators on Calendar */
        .indicators { display: flex; gap: 3px; height: 4px; justify-content: center; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-secondary); }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .section-header h3 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }

        .task-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
        .task-item {
            background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 24px;
            padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem; cursor: pointer;
            transition: all 0.3s var(--ease); animation: fadeIn 0.5s var(--ease) forwards;
        }
        .task-item:hover { transform: translateY(-3px); border-color: var(--accent-primary); }
        
        .task-checkbox-wrapper { width: 32px; height: 32px; }
        .task-checkbox {
            width: 100%; height: 100%; border-radius: 10px; border: 2.5px solid var(--accent-primary);
            cursor: pointer; appearance: none; display: grid; place-content: center; transition: all 0.3s var(--ease);
        }
        .task-checkbox:checked { background: var(--accent-primary); }
        .task-checkbox:checked::before { content: ''; width: 12px; height: 8px; border-left: 3px solid white; border-bottom: 3px solid white; transform: rotate(-45deg) translate(2px, -2px); }

        .task-info { flex: 1; }
        .task-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.6rem; }
        .tag-badge { font-size: 0.75rem; padding: 4px 14px; border-radius: 14px; font-weight: 800; color: white; text-transform: uppercase; letter-spacing: 0.5px; }

        .fab {
            position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%); height: 72px;
            padding: 0 2.5rem; border-radius: 36px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white; border: none; font-family: inherit; font-weight: 800; font-size: 1.1rem;
            display: flex; align-items: center; gap: 1rem; box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4);
            cursor: pointer; z-index: 100; transition: all 0.4s var(--ease);
        }
        .fab:hover { transform: translateX(-50%) translateY(-5px); box-shadow: 0 20px 45px rgba(139, 92, 246, 0.5); }

        /* Modal Sheets */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            z-index: 1000; align-items: flex-end; justify-content: center;
        }
        @media (min-width: 600px) { .modal { align-items: center; padding: 1.5rem; } }
        
        .modal-content {
            background: var(--bg-main); width: 100%; max-width: 520px; border-radius: 40px 40px 0 0;
            padding: 2.5rem; border: 1px solid var(--border-glass); animation: slideUp 0.5s var(--ease) forwards;
        }
        @media (min-width: 600px) { .modal-content { border-radius: 40px; } }

        .form-group { margin-bottom: 2rem; }
        label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1.5px; }
        
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%; padding: 1.25rem; border-radius: 20px; background: var(--card-glass);
            border: 1px solid var(--border-glass); color: var(--text-primary); font-family: inherit; font-size: 1.1rem;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-top: 1.5rem; }
        .stat-card { background: var(--card-glass); padding: 1.5rem; border-radius: 24px; border: 1px solid var(--border-glass); }
        .stat-value { font-size: 1.75rem; font-weight: 800; color: var(--accent-primary); margin-bottom: 0.25rem; }
        .stat-label { font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <header>
        <div class="header-title">Our Planner</div>
        <div class="header-actions">
            <button class="icon-btn" onclick="openStatsModal()"><i data-lucide="activity" size="24"></i></button>
            <div class="select-wrapper">
                <select id="currentUser" onchange="switchUser()">
                    <option value="Viki">Viki</option>
                    <option value="Manja">Manja</option>
                    <option value="Admin">Admin</option>
                </select>
                <i data-lucide="chevron-down" class="select-chevron" size="18"></i>
            </div>
            <button class="icon-btn" onclick="openCategoryModal()"><i data-lucide="settings" size="24"></i></button>
        </div>
    </header>

    <main>
        <div class="search-container">
            <i data-lucide="search" class="search-icon" size="24"></i>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search yours or others tasks..." oninput="renderTasks()">
        </div>

        <div class="card">
            <div class="calendar-header">
                <button class="icon-btn" onclick="prevMonth()"><i data-lucide="chevron-left" size="24"></i></button>
                <h3 id="monthDisplay">--</h3>
                <button class="icon-btn" onclick="nextMonth()"><i data-lucide="chevron-right" size="24"></i></button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="tasks-container">
            <div class="section-header">
                <div class="header-info">
                    <h3 id="selectedDateDisplay">Today</h3>
                    <p style="color: var(--text-secondary); font-size: 1rem; font-weight: 500;" id="taskCount">0 tasks total</p>
                </div>
                <div class="select-wrapper">
                    <select id="filterCategory" onchange="renderTasks()">
                        <option value="all">Tags</option>
                    </select>
                    <i data-lucide="filter" class="select-chevron" size="18"></i>
                </div>
            </div>
            <ul id="taskList" class="task-list"></ul>
        </div>
    </main>

    <button class="fab" onclick="openTaskModal()">
        <i data-lucide="plus-circle" size="28"></i>
        <span>New Task</span>
    </button>

    <!-- Stats Modal -->
    <div id="statsModal" class="modal" onclick="if(event.target === this) closeStatsModal()">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
                <h3 style="font-size: 1.5rem; font-weight: 800;">System Health</h3>
                <button class="icon-btn" onclick="closeStatsModal()"><i data-lucide="x" size="24"></i></button>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Memory</div>
                    <div class="stat-value" id="statRam">--</div>
                    <div id="statRamDetail" style="font-size: 0.8rem; opacity: 0.6;">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">CPU Load</div>
                    <div class="stat-value" id="statCpu">--</div>
                    <div id="statCpuDetail" style="font-size: 0.8rem; opacity: 0.6;">--</div>
                </div>
                <div class="stat-card" style="grid-column: span 2;">
                    <div class="stat-label">Server Uptime</div>
                    <div class="stat-value" id="statUptime">--</div>
                </div>
            </div>
            <div class="btn-group" style="margin-top: 2rem;">
                <button class="btn btn-secondary" onclick="closeStatsModal()">Close Monitor</button>
            </div>
        </div>
    </div>

    <!-- Category Settings -->
    <div id="categoryModal" class="modal" onclick="if(event.target === this) closeCategoryModal()">
        <div class="modal-content">
            <h3 style="margin-bottom: 2rem; font-size: 1.5rem; font-weight: 800;">Customize Tags</h3>
            <div id="categoryList" style="max-height: 250px; overflow-y: auto; margin-bottom: 2rem;"></div>
            <div style="padding: 1.5rem; background: var(--card-glass); border-radius: 24px; border: 1px solid var(--border-glass);">
                <label style="margin-bottom: 0.5rem; display: block;">Create Tag</label>
                <div style="display: flex; gap: 0.75rem; align-items: center;">
                    <input type="text" id="newCatName" placeholder="Tag Name" style="flex: 1;">
                    <input type="color" id="newCatColor" style="width: 64px; height: 60px; padding: 0.2rem; border-radius: 14px; border: 1px solid var(--border-glass); background: transparent;">
                </div>
                <button class="btn btn-primary" onclick="addCategory()" style="margin-top: 1rem; width: 100%;">Create New Tag</button>
            </div>
            <div class="btn-group"><button class="btn btn-secondary" onclick="closeCategoryModal()">Done</button></div>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom: 2.5rem; font-size: 1.8rem; font-weight: 800;">Plan Task</h3>
            <input type="hidden" id="editTaskId">
            <div class="form-group"><label>Title</label><input type="text" id="taskTitleInput" placeholder="What's happening?"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group"><label>When</label><input type="date" id="taskDateInput"></div>
                <div class="form-group"><label>Lead Days</label><input type="number" id="remindDaysInput" value="2"></div>
            </div>
            <div class="form-group">
                <label>Tag</label>
                <div class="select-wrapper">
                    <select id="taskCategorySelect"></select>
                    <i data-lucide="tag" class="select-chevron" size="18"></i>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteTask()"><i data-lucide="trash" size="20"></i> Delete</button>
                <button class="btn btn-primary" onclick="saveTask()"><i data-lucide="check" size="20"></i> Save Plan</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = []; let categories = []; let currentViewDate = new Date(); let selectedDate = new Date(); let currentUser = 'Viki'; let lastTap = 0;

        async function loadData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                tasks = data.tasks; categories = data.categories;
                updateCategoryUI(); renderCalendar(); renderTasks();
            } catch (e) { console.error('Data loading error', e); }
        }

        async function saveData() {
            await fetch('/api/data', { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ tasks, categories }) 
            });
        }

        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('statRam').innerText = data.ram.percent;
                document.getElementById('statRamDetail').innerText = `${data.ram.used} / ${data.ram.total}`;
                document.getElementById('statCpu').innerText = data.cpu.load;
                document.getElementById('statCpuDetail').innerText = `${data.cpu.cores} Cores | ${data.cpu.model.split(' ')[0]}`;
                document.getElementById('statUptime').innerText = data.uptime;
            } catch (e) { }
        }

        function openStatsModal() { document.getElementById('statsModal').style.display = 'flex'; updateStats(); statsInterval = setInterval(updateStats, 3000); }
        function closeStatsModal() { document.getElementById('statsModal').style.display = 'none'; clearInterval(statsInterval); }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); 
            const year = currentViewDate.getFullYear(); const month = currentViewDate.getMonth();
            grid.innerHTML = '<div class="day-name">S</div><div class="day-name">M</div><div class="day-name">T</div><div class="day-name">W</div><div class="day-name">T</div><div class="day-name">F</div><div class="day-name">S</div>';
            document.getElementById('monthDisplay').innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentViewDate);
            
            const first = new Date(year, month, 1).getDay(); const days = new Date(year, month + 1, 0).getDate();
            const prevMonth = new Date(year, month, 0).getDate();

            for(let i=0; i<first; i++) grid.appendChild(createDayElement(new Date(year, month-1, prevMonth - first + i + 1), true));
            for(let i=1; i<=days; i++) grid.appendChild(createDayElement(new Date(year, month, i), false));
            while(grid.children.length < 49) {
                const dayNum = grid.children.length - 7 - days - first + 1;
                grid.appendChild(createDayElement(new Date(year, month+1, dayNum), true));
            }
            lucide.createIcons();
        }

        function createDayElement(date, isOther) {
            const div = document.createElement('div'); div.className = 'day' + (isOther ? ' other-month' : '');
            const dateStr = date.toISOString().split('T')[0];
            const dayTasks = tasks.filter(t => t.date === dateStr && t.user === currentUser);
            
            if(dayTasks.length > 0) div.classList.add('has-task');
            if(dateStr === new Date().toISOString().split('T')[0]) div.classList.add('today');
            if(dateStr === selectedDate.toISOString().split('T')[0]) div.classList.add('selected');
            
            div.innerHTML = `<span style="z-index:1">${date.getDate()}</span>`;
            
            // Task dots/indicators
            const indicators = document.createElement('div'); indicators.className = 'indicators';
            dayTasks.slice(0, 3).forEach(t => {
                const cat = categories.find(c => c.name === t.category);
                const dot = document.createElement('div'); dot.className = 'dot';
                dot.style.background = cat ? cat.color : 'white';
                dot.style.boxShadow = `0 0 5px ${cat ? cat.color : 'white'}`;
                indicators.appendChild(dot);
            });
            div.appendChild(indicators);

            // Double Tap Logic
            div.addEventListener('click', (e) => {
                const now = Date.now();
                if (now - lastTap < 300) { // Double tap detected
                    selectedDate = date; openTaskModal();
                } else {
                    if(!isOther) { 
                        selectedDate = date; 
                        document.getElementById('selectedDateDisplay').innerText = date.toLocaleDateString('en-US', {day:'numeric', month:'long'});
                        renderCalendar(); renderTasks(); 
                    }
                }
                lastTap = now;
            });
            
            return div;
        }

        function updateCategoryUI() {
            const filter = document.getElementById('filterCategory'); 
            const taskSel = document.getElementById('taskCategorySelect');
            filter.innerHTML = '<option value="all">Any Tag</option>' + categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            taskSel.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }

        function renderTasks() {
            const list = document.getElementById('taskList'); list.innerHTML = '';
            const dStr = selectedDate.toISOString().split('T')[0]; 
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterCategory').value;
            
            const filtered = tasks.filter(t => t.user === currentUser && t.date === dStr && t.title.toLowerCase().includes(search) && (filter === 'all' || t.category === filter));
            document.getElementById('taskCount').innerText = `${filtered.length} tasks scheduled`;

            if(filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 3rem; opacity: 0.4;"><i data-lucide="calendar-check-2" size="64"></i><p style="margin-top:1rem; font-weight:600;">Perfectly clear!</p></div>`;
                lucide.createIcons(); return;
            }

            filtered.forEach(t => {
                const cat = categories.find(c => c.name === t.category) || {color:'#888', name:'None'};
                const li = document.createElement('li'); li.className = 'task-item'; li.style.borderLeft = `6px solid ${cat.color}`;
                li.innerHTML = `
                    <div class="task-checkbox-wrapper"><input type="checkbox" class="task-checkbox" ${t.completed?'checked':''} onclick="event.stopPropagation(); completeTask('${t.id}', this.checked)"></div>
                    <div class="task-info" onclick="openTaskModal('${t.id}')">
                        <div class="task-title" style="${t.completed?'text-decoration:line-through;opacity:0.4':''}">${t.title}</div>
                        <span class="tag-badge" style="background:${cat.color}">${cat.name}</span>
                    </div>
                    <i data-lucide="chevron-right" size="24" style="opacity:0.3"></i>
                `;
                list.appendChild(li);
            });
            lucide.createIcons();
        }

        function openCategoryModal() { document.getElementById('categoryModal').style.display = 'flex'; renderCategoryList(); }
        function closeCategoryModal() { document.getElementById('categoryModal').style.display = 'none'; updateCategoryUI(); }
        
        function renderCategoryList() {
            const list = document.getElementById('categoryList');
            list.innerHTML = categories.map((cat, idx) => `
                <div style="display:flex; align-items:center; gap:1.5rem; padding:1.2rem; background:var(--card-glass); margin-bottom:0.75rem; border-radius:20px; border:1px solid var(--border-glass);">
                    <div style="width:28px; height:28px; border-radius:10px; background:${cat.color}; box-shadow:0 0 10px ${cat.color}"></div>
                    <span style="flex:1; font-weight:700; font-size:1.1rem;">${cat.name}</span>
                    <button class="icon-btn" onclick="removeCategory(${idx})" style="width:40px; height:40px; border:none;"><i data-lucide="trash-2" size="18"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            const color = document.getElementById('newCatColor').value;
            if (name) { categories.push({ name, color }); document.getElementById('newCatName').value = ''; saveData(); renderCategoryList(); updateCategoryUI(); }
        }
        function removeCategory(idx) { categories.splice(idx, 1); saveData(); renderCategoryList(); updateCategoryUI(); }

        function openTaskModal(id=null) {
            const m = document.getElementById('taskModal'); document.getElementById('deleteBtn').style.display = id ? 'flex' : 'none';
            if(id) {
                const t = tasks.find(x => x.id === id); document.getElementById('taskTitleInput').value = t.title;
                document.getElementById('taskDateInput').value = t.date; document.getElementById('remindDaysInput').value = t.remindDays;
                document.getElementById('taskCategorySelect').value = t.category; document.getElementById('editTaskId').value = id;
            } else {
                document.getElementById('taskTitleInput').value = ''; document.getElementById('taskDateInput').value = selectedDate.toISOString().split('T')[0];
                document.getElementById('remindDaysInput').value = 2; document.getElementById('editTaskId').value = '';
            }
            m.style.display = 'flex';
        }

        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
        function saveTask() {
            const editId = document.getElementById('editTaskId').value;
            const data = { title: document.getElementById('taskTitleInput').value, date: document.getElementById('taskDateInput').value, remindDays: document.getElementById('remindDaysInput').value, category: document.getElementById('taskCategorySelect').value };
            if(!data.title) return;
            if(editId) tasks[tasks.findIndex(x=>x.id===editId)] = {...tasks.find(x=>x.id===editId), ...data};
            else tasks.push({id: Date.now().toString(), user: currentUser, ...data, completed: false});
            saveData().then(() => { loadData(); closeModal(); });
        }

        function completeTask(id, val) { tasks.find(x=>x.id===id).completed = val; saveData().then(renderTasks); }
        function deleteTask() { tasks = tasks.filter(x=>x.id !== document.getElementById('editTaskId').value); saveData().then(()=>{loadData(); closeModal();}); }
        function switchUser() { currentUser = document.getElementById('currentUser').value; renderTasks(); renderCalendar(); }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth()-1); renderCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth()+1); renderCalendar(); }
        
        loadData();
    </script>
</body>
</html>
